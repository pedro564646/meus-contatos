<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendedora Vanessa</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0F4C81,#2563EB,#60A5FA);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:600px;
    background:rgba(255,255,255,0.96);
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

@keyframes brilho{
    from{
        text-shadow:
            0 0 10px #ffffff,
            0 0 20px #60A5FA,
            0 0 35px #2563EB;
    }

    to{
        text-shadow:
            0 0 20px #ffffff,
            0 0 35px #93C5FD,
            0 0 50px #2563EB;
    }
}

h1{
    font-size:34px;
    color:#2563EB;
    font-weight:bold;
    text-align:center;
    margin-bottom:30px;
    animation:brilho 2s infinite alternate;
}

img{
    width:200px;
    height:200px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #2563EB;
    margin-bottom:30px;
}

.botao{
    display:block;
    text-decoration:none;
    color:white;
    font-size:18px;
    font-weight:bold;
    padding:16px;
    margin:15px 0;
    border-radius:15px;
    transition:.3s;
}

.botao:hover{
    transform:scale(1.05);
}

.whatsapp{
    background:#25D366;
}

.instagram{
    background:linear-gradient(45deg,#F58529,#DD2A7B,#8134AF,#515BD4);
}

.facebook{
    background:#1877F2;
}

footer{
    margin-top:25px;
    color:#777;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<h1>✨ Vendedora Vanessa ✨</h1>
